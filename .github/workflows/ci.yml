name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: cargo test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # Stress tests take many minutes per case and aren't useful in the
      # signal-fast PR loop. They run under the dedicated `stress` workflow.
      - name: Run tests (excluding stress)
        run: cargo test --workspace -- --skip test_stress

  clippy:
    name: cargo clippy (informational)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Run clippy as a signal but do not fail the run on warnings. The codebase
    # has a deliberate dense style that triggers many clippy idiom lints we're
    # not interested in chasing right now. The strict gate (-D warnings) can
    # be re-enabled once we do a focused cleanup pass.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-clippy-

      - name: Clippy
        run: cargo clippy --workspace --all-targets

  # cargo fmt --check intentionally NOT enforced. The project has a
  # `rustfmt.toml` documenting preferred settings (tab_spaces = 2, max_width
  # = 140, reorder_imports = false) but the existing codebase pre-dates
  # rustfmt adoption and contains thousands of intentional style deviations.
  # We may re-enable a fmt gate after a focused sweep.
