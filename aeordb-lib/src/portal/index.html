<!DOCTYPE html>
<html lang="en" class="notranslate" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google" content="notranslate">
  <title>AeorDB Portal</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg width='35' height='35' viewBox='0 0 34.999932 34.999931' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath fill='%23f97316' d='M 22.999629,0 0,34.99993 H 7.1680371 L 22.999629,10.921296 h 5.16e-4 L 26.235608,6.00015 h 2.764173 v 28.99978 h 3.235976 2.764174 V 0 h -6.00015 z m 0,21.843111 -8.650634,13.156819 h 8.650634 z' /%3E%3C/svg%3E">
  <link rel="stylesheet" href="/shared/styles/tokens.css">
  <link rel="stylesheet" href="/shared/styles/components.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 0.5rem; height: 0.5rem; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 0.25rem; }
    ::-webkit-scrollbar-thumb:hover { background: #484f58; }
    ::-webkit-scrollbar-corner { background: transparent; }
    * { scrollbar-width: thin; scrollbar-color: #30363d transparent; }

    /* Hide number input spinners */
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }

    :root {
      --background:  #0d1117;
      --sidebar:     #161b22;
      --card:        #161b22;
      --card-hover:  #21262d;
      --text:        #e6edf3;
      --text-muted:  #8b949e;
      --accent:      #f97316;
      --accent-hover:#fb923c;
      --border:      #30363d;
      --danger:      #f85149;
      --success:     #3fb950;
      --warning:     #d29922;
      --font-sans:   'Inter', system-ui, -apple-system, sans-serif;
      --font-mono:   'JetBrains Mono', 'SF Mono', 'Cascadia Code', monospace;
      --radius:      6px;
    }

    body {
      font-family: var(--font-sans);
      background: var(--background);
      color: var(--text);
      display: flex;
      min-height: 100vh;
      line-height: 1.5;
    }

    /* Sidebar */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: 13.75rem;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: none; /* Hidden by default — shown by JS when authenticated */
      flex-direction: column;
      z-index: 100;
    }

    .sidebar-logo {
      padding: 1.25rem;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.03125rem;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-nav { padding: 0.75rem 0; flex: 1; }

    .nav-link {
      display: block;
      padding: 0.625rem 1.25rem;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      border-left: 3px solid transparent;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }

    .nav-link:hover {
      color: var(--text);
      background: rgba(88, 166, 255, 0.05);
    }

    .nav-link.active {
      color: var(--accent);
      border-left-color: var(--accent);
      background: rgba(88, 166, 255, 0.08);
    }

    /* Main content */
    .main {
      margin-left: 13.75rem;
      flex: 1;
      padding: 1.75rem 2rem;
      min-height: 100vh;
    }

    /* Cards */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 1.25rem;
    }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 0.875rem;
      margin-bottom: 1.75rem;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 1rem 1.125rem;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      cursor: default;
    }

    .stat-card:hover {
      transform: translateY(-3px);
      border-color: var(--accent);
      box-shadow: 0 4px 20px rgba(249, 115, 22, 0.12), 0 0 0 1px rgba(249, 115, 22, 0.08);
    }

    .stat-card:hover .stat-value {
      color: var(--accent);
      transition: color 0.2s ease;
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.03125rem;
      margin-bottom: 0.375rem;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      font-family: var(--font-mono);
      color: var(--text);
    }

    /* Charts */
    .charts-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.125rem;
      margin-bottom: 1.75rem;
    }

    @media (max-width: 900px) {
      .charts-row { grid-template-columns: 1fr; }
    }

    .chart-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 1.25rem;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .chart-card:hover {
      transform: translateY(-3px);
      border-color: var(--accent);
      box-shadow: 0 4px 20px rgba(249, 115, 22, 0.12), 0 0 0 1px rgba(249, 115, 22, 0.08);
    }

    .chart-title {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 0.875rem;
      color: var(--text);
    }

    .chart-container {
      width: 100%;
      min-height: 15rem;
    }

    /* Table */
    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    th, td {
      padding: 0.625rem 0.875rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    th {
      color: var(--text-muted);
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.025rem;
    }

    tr:hover td { background: rgba(88, 166, 255, 0.04); }

    /* Badges */
    .badge {
      display: inline-block;
      padding: 0.125rem 0.5rem;
      border-radius: 0.75rem;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .badge-active { background: rgba(63, 185, 80, 0.15); color: var(--success); }
    .badge-inactive { background: rgba(248, 81, 73, 0.15); color: var(--danger); }

    /* Buttons */
    .button {
      display: inline-flex;
      align-items: center;
      height: 2.125rem;
      padding: 0 1rem;
      border: 1px solid var(--border);
      border-radius: 0.375rem;
      background: var(--card);
      color: var(--text);
      font-size: 0.85rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, filter 0.15s;
      box-sizing: border-box;
    }

    .button:hover {
      background: color-mix(in srgb, var(--card) 80%, #fff);
      border-color: var(--accent);
    }

    .button-primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-weight: 600;
    }

    .button-primary:hover {
      background: var(--accent-hover);
      border-color: #fff;
    }

    .button-danger {
      color: var(--danger);
      border-color: var(--border);
    }

    .button-danger:hover {
      background: color-mix(in srgb, var(--card) 80%, #fff);
      border-color: var(--danger);
    }

    .button-small { height: 1.75rem; padding: 0 0.625rem; font-size: 0.78rem; }

    /* Forms */
    .form-group { margin-bottom: 0.875rem; }

    .form-label {
      display: block;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 0.25rem;
    }

    .form-input {
      width: 100%;
      padding: 0.5rem 0.75rem;
      background: var(--background);
      border: 1px solid var(--border);
      border-radius: 0.375rem;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .form-input:focus { border-color: var(--accent); }

    /* Alert */
    .alert {
      padding: 0.625rem 1rem;
      border-radius: 0.375rem;
      margin-bottom: 1rem;
      font-size: 0.85rem;
    }

    .alert-error {
      background: rgba(248, 81, 73, 0.12);
      border: 1px solid rgba(248, 81, 73, 0.3);
      color: var(--danger);
    }

    .alert-info {
      background: rgba(88, 166, 255, 0.1);
      border: 1px solid rgba(88, 166, 255, 0.2);
      color: var(--accent);
    }

    /* Login */
    .login-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 60vh;
    }

    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 0.625rem;
      padding: 2rem;
      width: 100%;
      max-width: 23.75rem;
    }

    .login-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 1.25rem;
      text-align: center;
    }

    /* Modal overlay */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 200;
    }

    .modal-content {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 0.625rem;
      padding: 1.75rem;
      width: 100%;
      max-width: 26.25rem;
    }

    .modal-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 1.125rem;
    }

    .modal-actions {
      display: flex;
      gap: 0.625rem;
      justify-content: flex-end;
      margin-top: 1.125rem;
    }

    /* Page header */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
    }

    .page-title {
      font-size: 1.3rem;
      font-weight: 700;
    }

    /* Toggle */
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .toggle {
      position: relative;
      width: 2.5rem;
      height: 1.375rem;
      cursor: pointer;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 0.6875rem;
      transition: background 0.2s;
    }

    .toggle-track::after {
      content: '';
      position: absolute;
      width: 1rem;
      height: 1rem;
      background: var(--text);
      border-radius: 50%;
      top: 0.1875rem;
      left: 0.1875rem;
      transition: transform 0.2s;
    }

    .toggle input:checked + .toggle-track { background: var(--accent); }
    .toggle input:checked + .toggle-track::after { transform: translateX(1.125rem); }

    /* Sidebar footer */
    .sidebar-footer {
      padding: 0.75rem 0;
      border-top: 1px solid var(--border);
    }

    .logout-button {
      width: 100%;
      background: none;
      font-family: inherit;
      border: none;
      text-align: left;
      color: var(--text-muted);
    }

    .logout-button:hover { color: var(--danger); }

    /* Crudlify toggle */
    .crudlify-row {
      display: flex;
      gap: 0.25rem;
    }

    .crudlify-flag {
      width: 2rem;
      height: 2rem;
      border: 1px solid var(--border);
      border-radius: 0.25rem;
      background: var(--background);
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      user-select: none;
    }

    .crudlify-flag:hover {
      border-color: var(--accent);
    }

    .crudlify-flag.active {
      background: rgba(240, 136, 62, 0.2);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Utility */
    .flex-gap { display: flex; gap: 0.5rem; }
    .text-muted { color: var(--text-muted); }
    .mb-4 { margin-bottom: 1rem; }
    .hidden { display: none !important; }

    /* Empty states */
    .empty-state { text-align: center; padding: 2.5rem; }
    .empty-state-message { color: #8b949e; }
    .empty-state-message-lg { color: #8b949e; font-size: 1rem; }

    /* Search bar wrapper */
    .search-bar-wrap { margin-bottom: 1rem; }

    /* Section gap (tab bars, info boxes) */
    .section-gap { margin-bottom: 1.25rem; }

    /* Modal body text */
    .modal-body-text { color: var(--text-muted); margin-bottom: 1.125rem; }

    /* Monospace table cells */
    .cell-mono { font-family: var(--font-mono); font-size: 0.85rem; }

    /* Toggle label inline */
    .toggle-label { margin-bottom: 0; }

    /* Card section heading */
    .card-heading { font-size: 1.1rem; font-weight: 700; margin-bottom: 1.125rem; }

    /* Form actions row */
    .form-actions { display: flex; gap: 0.625rem; margin-top: 1.125rem; }

    /* Monospace form input */
    .form-input-mono { font-family: var(--font-mono); font-size: 0.85rem; }

    /* Warning alert */
    .alert-warning {
      background: rgba(210, 153, 34, 0.12);
      border: 1px solid rgba(210, 153, 34, 0.3);
      color: var(--warning);
      margin-bottom: 1rem;
    }

    /* Key/detail metadata lines */
    .detail-line { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 0.5rem; }
    .detail-line-last { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 1rem; }

    /* Inline mono text */
    .mono { font-family: var(--font-mono); }

    /* Small uppercase field label */
    .field-label-small {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.01875rem;
    }

    /* Muted badge */
    .badge-muted { background: rgba(139, 148, 158, 0.15); color: var(--text-muted); }

    /* Confirm-button theme variants */
    .confirm-button-danger {
      --lpb-fill: var(--danger, #f85149);
      --lpb-text: var(--danger, #f85149);
    }
    .confirm-button-restore {
      --lpb-bg: var(--accent, #f97316);
      --lpb-text: #fff;
      --lpb-fill: var(--success, #3fb950);
      --lpb-border: var(--accent, #f97316);
    }

    /* Checkbox label (flex with gap) */
    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
    }

    /* Form hint text */
    .form-hint {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }

    /* Mobile top bar */
    .mobile-top-bar {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 3.25rem;
      background: var(--sidebar);
      border-bottom: 1px solid var(--border);
      z-index: 200;
      align-items: center;
      padding: 0 1rem;
      gap: 0.75rem;
    }

    .mobile-menu-toggle {
      display: none;
      background: none;
      border: none;
      color: var(--accent);
      font-size: 1.4rem;
      width: 2.25rem;
      height: 2.25rem;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      line-height: 1;
      padding: 0;
    }

    .mobile-top-bar .mobile-logo {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
    }

    /* Mobile: sidebar overlay */
    @media (max-width: 768px) {
      .mobile-top-bar { display: flex; }
      .mobile-menu-toggle { display: flex; }

      .sidebar {
        transform: translateX(-100%);
        transition: transform 0.25s ease;
        z-index: 150;
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .sidebar-backdrop {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 140;
      }

      .sidebar-backdrop.open {
        display: block;
      }

      .main {
        margin-left: 0;
        padding: 4.25rem 1rem 1rem 1rem;
        overflow-x: hidden;
      }

      /* Responsive tables */
      .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      table { font-size: 0.8rem; }
      th, td { padding: 0.5rem 0.625rem; }

      /* Responsive stat cards */
      .stats-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.625rem; }
      .stat-value { font-size: 1.2rem; }

      /* Charts stack */
      .charts-row { grid-template-columns: 1fr; }

      /* Login card */
      .login-card { max-width: 100%; margin: 0 0.5rem; }

      /* Page header */
      .page-header { flex-wrap: wrap; gap: 0.625rem; }
    }

    /* Focus-visible styles for interactive elements */
    button:focus-visible,
    input:focus-visible,
    select:focus-visible,
    textarea:focus-visible,
    a:focus-visible,
    .button:focus-visible,
    .nav-link:focus-visible,
    [tabindex]:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      * {
        transition: none !important;
        animation: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="mobile-top-bar">
    <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="Menu">&#9776;</button>
    <span class="mobile-logo"><svg width="18" height="18" viewBox="0 0 34.999932 34.999931" xmlns="http://www.w3.org/2000/svg" style="vertical-align: -2px; margin-right: 6px;"><path fill="#f97316" d="M 22.999629,0 0,34.99993 H 7.1680371 L 22.999629,10.921296 h 5.16e-4 L 26.235608,6.00015 h 2.764173 v 28.99978 h 3.235976 2.764174 V 0 h -6.00015 z m 0,21.843111 -8.650634,13.156819 h 8.650634 z"/></svg>AeorDB</span>
  </div>
  <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><svg width="20" height="20" viewBox="0 0 34.999932 34.999931" xmlns="http://www.w3.org/2000/svg" style="vertical-align: -2px; margin-right: 8px;"><path fill="#f97316" d="M 22.999629,0 0,34.99993 H 7.1680371 L 22.999629,10.921296 h 5.16e-4 L 26.235608,6.00015 h 2.764173 v 28.99978 h 3.235976 2.764174 V 0 h -6.00015 z m 0,21.843111 -8.650634,13.156819 h 8.650634 z"/></svg>AeorDB</div>
    <nav class="sidebar-nav">
      <a class="nav-link active" data-page="dashboard" href="?page=dashboard">Dashboard</a>
      <a class="nav-link" data-page="files" href="?page=files">Files</a>
      <a class="nav-link" data-page="users" href="?page=users">Users</a>
      <a class="nav-link" data-page="groups" href="?page=groups">Groups</a>
      <a class="nav-link" data-page="keys" href="?page=keys">Keys</a>
      <a class="nav-link" data-page="snapshots" href="?page=snapshots">Snapshots</a>
      <a class="nav-link" data-page="settings" href="?page=settings">Settings</a>
    </nav>
    <div class="sidebar-footer">
      <button class="nav-link logout-button" id="logout-button">Logout</button>
    </div>
  </aside>
  <main class="main" id="main-content"></main>

  <script>
    // Mobile sidebar toggle
    const menuToggle = document.getElementById('mobile-menu-toggle');
    const sidebar = document.getElementById('sidebar');
    const backdrop = document.getElementById('sidebar-backdrop');

    function toggleSidebar() {
      sidebar.classList.toggle('open');
      backdrop.classList.toggle('open');
    }

    function closeSidebar() {
      sidebar.classList.remove('open');
      backdrop.classList.remove('open');
    }

    menuToggle.addEventListener('click', toggleSidebar);
    backdrop.addEventListener('click', closeSidebar);

    // Close sidebar when a nav link is clicked (mobile)
    sidebar.querySelectorAll('.nav-link').forEach(function(link) {
      link.addEventListener('click', closeSidebar);
    });
  </script>
  <script type="module" src="/app.mjs"></script>
</body>
</html>
