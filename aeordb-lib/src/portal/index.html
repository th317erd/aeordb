<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AeorDB Portal</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg width='35' height='35' viewBox='0 0 34.999932 34.999931' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath fill='%23f97316' d='M 22.999629,0 0,34.99993 H 7.1680371 L 22.999629,10.921296 h 5.16e-4 L 26.235608,6.00015 h 2.764173 v 28.99978 h 3.235976 2.764174 V 0 h -6.00015 z m 0,21.843111 -8.650634,13.156819 h 8.650634 z' /%3E%3C/svg%3E">
  <link rel="stylesheet" href="/system/portal/shared/styles/tokens.css">
  <link rel="stylesheet" href="/system/portal/shared/styles/components.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --background:  #0d1117;
      --sidebar:     #161b22;
      --card:        #161b22;
      --card-hover:  #21262d;
      --text:        #e6edf3;
      --text-muted:  #8b949e;
      --accent:      #f97316;
      --accent-hover:#fb923c;
      --border:      #30363d;
      --danger:      #f85149;
      --success:     #3fb950;
      --warning:     #d29922;
      --font-sans:   'Inter', system-ui, -apple-system, sans-serif;
      --font-mono:   'JetBrains Mono', 'SF Mono', 'Cascadia Code', monospace;
      --radius:      6px;
    }

    body {
      font-family: var(--font-sans);
      background: var(--background);
      color: var(--text);
      display: flex;
      min-height: 100vh;
      line-height: 1.5;
    }

    /* Sidebar */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: 220px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 100;
    }

    .sidebar-logo {
      padding: 20px;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-nav { padding: 12px 0; flex: 1; }

    .nav-link {
      display: block;
      padding: 10px 20px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      border-left: 3px solid transparent;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }

    .nav-link:hover {
      color: var(--text);
      background: rgba(88, 166, 255, 0.05);
    }

    .nav-link.active {
      color: var(--accent);
      border-left-color: var(--accent);
      background: rgba(88, 166, 255, 0.08);
    }

    /* Main content */
    .main {
      margin-left: 220px;
      flex: 1;
      padding: 28px 32px;
      min-height: 100vh;
    }

    /* Cards */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
    }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 18px;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      cursor: default;
    }

    .stat-card:hover {
      transform: translateY(-3px);
      border-color: var(--accent);
      box-shadow: 0 4px 20px rgba(249, 115, 22, 0.12), 0 0 0 1px rgba(249, 115, 22, 0.08);
    }

    .stat-card:hover .stat-value {
      color: var(--accent);
      transition: color 0.2s ease;
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      font-family: var(--font-mono);
      color: var(--text);
    }

    /* Charts */
    .charts-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-bottom: 28px;
    }

    @media (max-width: 900px) {
      .charts-row { grid-template-columns: 1fr; }
    }

    .chart-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .chart-card:hover {
      transform: translateY(-3px);
      border-color: var(--accent);
      box-shadow: 0 4px 20px rgba(249, 115, 22, 0.12), 0 0 0 1px rgba(249, 115, 22, 0.08);
    }

    .chart-title {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 14px;
      color: var(--text);
    }

    .chart-container {
      width: 100%;
      min-height: 240px;
    }

    /* Table */
    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    th, td {
      padding: 10px 14px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    th {
      color: var(--text-muted);
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    tr:hover td { background: rgba(88, 166, 255, 0.04); }

    /* Badges */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .badge-active { background: rgba(63, 185, 80, 0.15); color: var(--success); }
    .badge-inactive { background: rgba(248, 81, 73, 0.15); color: var(--danger); }

    /* Buttons */
    .button {
      display: inline-flex;
      align-items: center;
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--card);
      color: var(--text);
      font-size: 0.85rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .button:hover { border-color: var(--accent); background: rgba(88, 166, 255, 0.08); }

    .button-primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-weight: 600;
    }

    .button-primary:hover { background: var(--accent-hover); }

    .button-danger { color: var(--danger); border-color: var(--danger); }
    .button-danger:hover { background: rgba(248, 81, 73, 0.1); }

    .button-small { padding: 4px 10px; font-size: 0.78rem; }

    /* Forms */
    .form-group { margin-bottom: 14px; }

    .form-label {
      display: block;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .form-input {
      width: 100%;
      padding: 8px 12px;
      background: var(--background);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .form-input:focus { border-color: var(--accent); }

    /* Alert */
    .alert {
      padding: 10px 16px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 0.85rem;
    }

    .alert-error {
      background: rgba(248, 81, 73, 0.12);
      border: 1px solid rgba(248, 81, 73, 0.3);
      color: var(--danger);
    }

    .alert-info {
      background: rgba(88, 166, 255, 0.1);
      border: 1px solid rgba(88, 166, 255, 0.2);
      color: var(--accent);
    }

    /* Login */
    .login-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 60vh;
    }

    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 32px;
      width: 100%;
      max-width: 380px;
    }

    .login-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 20px;
      text-align: center;
    }

    /* Modal overlay */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 200;
    }

    .modal-content {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 28px;
      width: 100%;
      max-width: 420px;
    }

    .modal-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 18px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 18px;
    }

    /* Page header */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .page-title {
      font-size: 1.3rem;
      font-weight: 700;
    }

    /* Toggle */
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
      cursor: pointer;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 11px;
      transition: background 0.2s;
    }

    .toggle-track::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      background: var(--text);
      border-radius: 50%;
      top: 3px;
      left: 3px;
      transition: transform 0.2s;
    }

    .toggle input:checked + .toggle-track { background: var(--accent); }
    .toggle input:checked + .toggle-track::after { transform: translateX(18px); }

    /* Sidebar footer */
    .sidebar-footer {
      padding: 12px 0;
      border-top: 1px solid var(--border);
    }

    .logout-button {
      width: 100%;
      background: none;
      font-family: inherit;
      border: none;
      text-align: left;
      color: var(--text-muted);
    }

    .logout-button:hover { color: var(--danger); }

    /* Crudlify toggle */
    .crudlify-row {
      display: flex;
      gap: 4px;
    }

    .crudlify-flag {
      width: 32px;
      height: 32px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--background);
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      user-select: none;
    }

    .crudlify-flag:hover {
      border-color: var(--accent);
    }

    .crudlify-flag.active {
      background: rgba(240, 136, 62, 0.2);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Utility */
    .flex-gap { display: flex; gap: 8px; }
    .text-muted { color: var(--text-muted); }
    .mb-4 { margin-bottom: 16px; }

    /* Mobile top bar */
    .mobile-top-bar {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 52px;
      background: var(--sidebar);
      border-bottom: 1px solid var(--border);
      z-index: 200;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
    }

    .mobile-menu-toggle {
      display: none;
      background: none;
      border: none;
      color: var(--accent);
      font-size: 1.4rem;
      width: 36px;
      height: 36px;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      line-height: 1;
      padding: 0;
    }

    .mobile-top-bar .mobile-logo {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
    }

    /* Mobile: sidebar overlay */
    @media (max-width: 768px) {
      .mobile-top-bar { display: flex; }
      .mobile-menu-toggle { display: flex; }

      .sidebar {
        transform: translateX(-100%);
        transition: transform 0.25s ease;
        z-index: 150;
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .sidebar-backdrop {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 140;
      }

      .sidebar-backdrop.open {
        display: block;
      }

      .main {
        margin-left: 0;
        padding: 68px 16px 16px 16px;
        overflow-x: hidden;
      }

      /* Responsive tables */
      .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      table { font-size: 0.8rem; }
      th, td { padding: 8px 10px; }

      /* Responsive stat cards */
      .stats-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
      .stat-value { font-size: 1.2rem; }

      /* Charts stack */
      .charts-row { grid-template-columns: 1fr; }

      /* Login card */
      .login-card { max-width: 100%; margin: 0 8px; }

      /* Page header */
      .page-header { flex-wrap: wrap; gap: 10px; }
    }
  </style>
</head>
<body>
  <div class="mobile-top-bar">
    <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="Menu">&#9776;</button>
    <span class="mobile-logo"><svg width="18" height="18" viewBox="0 0 34.999932 34.999931" xmlns="http://www.w3.org/2000/svg" style="vertical-align: -2px; margin-right: 6px;"><path fill="#f97316" d="M 22.999629,0 0,34.99993 H 7.1680371 L 22.999629,10.921296 h 5.16e-4 L 26.235608,6.00015 h 2.764173 v 28.99978 h 3.235976 2.764174 V 0 h -6.00015 z m 0,21.843111 -8.650634,13.156819 h 8.650634 z"/></svg>AeorDB</span>
  </div>
  <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><svg width="20" height="20" viewBox="0 0 34.999932 34.999931" xmlns="http://www.w3.org/2000/svg" style="vertical-align: -2px; margin-right: 8px;"><path fill="#f97316" d="M 22.999629,0 0,34.99993 H 7.1680371 L 22.999629,10.921296 h 5.16e-4 L 26.235608,6.00015 h 2.764173 v 28.99978 h 3.235976 2.764174 V 0 h -6.00015 z m 0,21.843111 -8.650634,13.156819 h 8.650634 z"/></svg>AeorDB</div>
    <nav class="sidebar-nav">
      <a class="nav-link active" data-page="dashboard" href="?page=dashboard">Dashboard</a>
      <a class="nav-link" data-page="files" href="?page=files">Files</a>
      <a class="nav-link" data-page="users" href="?page=users">Users</a>
      <a class="nav-link" data-page="groups" href="?page=groups">Groups</a>
      <a class="nav-link" data-page="keys" href="?page=keys">Keys</a>
      <a class="nav-link" data-page="settings" href="?page=settings">Settings</a>
    </nav>
    <div class="sidebar-footer">
      <button class="nav-link logout-button" id="logout-button">Logout</button>
    </div>
  </aside>
  <main class="main" id="main-content"></main>

  <script>
    // Mobile sidebar toggle
    const menuToggle = document.getElementById('mobile-menu-toggle');
    const sidebar = document.getElementById('sidebar');
    const backdrop = document.getElementById('sidebar-backdrop');

    function toggleSidebar() {
      sidebar.classList.toggle('open');
      backdrop.classList.toggle('open');
    }

    function closeSidebar() {
      sidebar.classList.remove('open');
      backdrop.classList.remove('open');
    }

    menuToggle.addEventListener('click', toggleSidebar);
    backdrop.addEventListener('click', closeSidebar);

    // Close sidebar when a nav link is clicked (mobile)
    sidebar.querySelectorAll('.nav-link').forEach(function(link) {
      link.addEventListener('click', closeSidebar);
    });
  </script>
  <script type="module" src="/system/portal/app.mjs"></script>
</body>
</html>
