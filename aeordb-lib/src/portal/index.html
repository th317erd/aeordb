<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AeorDB Portal</title>
  <link rel="stylesheet" href="https://unpkg.com/react-charty@0.1.7/dist/charty.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --background:  #0f1117;
      --sidebar:     #161b22;
      --card:        #1c2128;
      --text:        #e6edf3;
      --text-muted:  #8b949e;
      --accent:      #58a6ff;
      --border:      #30363d;
      --danger:      #f85149;
      --success:     #3fb950;
      --font-sans:   system-ui, -apple-system, sans-serif;
      --font-mono:   'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
    }

    body {
      font-family: var(--font-sans);
      background: var(--background);
      color: var(--text);
      display: flex;
      min-height: 100vh;
      line-height: 1.5;
    }

    /* Sidebar */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: 220px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 100;
    }

    .sidebar-logo {
      padding: 20px;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-nav { padding: 12px 0; flex: 1; }

    .nav-link {
      display: block;
      padding: 10px 20px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      border-left: 3px solid transparent;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }

    .nav-link:hover {
      color: var(--text);
      background: rgba(88, 166, 255, 0.05);
    }

    .nav-link.active {
      color: var(--accent);
      border-left-color: var(--accent);
      background: rgba(88, 166, 255, 0.08);
    }

    /* Main content */
    .main {
      margin-left: 220px;
      flex: 1;
      padding: 28px 32px;
      min-height: 100vh;
    }

    /* Cards */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
    }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 18px;
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      font-family: var(--font-mono);
      color: var(--text);
    }

    /* Charts */
    .charts-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-bottom: 28px;
    }

    @media (max-width: 900px) {
      .charts-row { grid-template-columns: 1fr; }
    }

    .chart-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
    }

    .chart-title {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 14px;
      color: var(--text);
    }

    .chart-container {
      width: 100%;
      min-height: 240px;
    }

    /* Table */
    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    th, td {
      padding: 10px 14px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    th {
      color: var(--text-muted);
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    tr:hover td { background: rgba(88, 166, 255, 0.04); }

    /* Badges */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .badge-active { background: rgba(63, 185, 80, 0.15); color: var(--success); }
    .badge-inactive { background: rgba(248, 81, 73, 0.15); color: var(--danger); }

    /* Buttons */
    .button {
      display: inline-flex;
      align-items: center;
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--card);
      color: var(--text);
      font-size: 0.85rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .button:hover { border-color: var(--accent); background: rgba(88, 166, 255, 0.08); }

    .button-primary {
      background: var(--accent);
      color: #0d1117;
      border-color: var(--accent);
      font-weight: 600;
    }

    .button-primary:hover { background: #79b8ff; }

    .button-danger { color: var(--danger); border-color: var(--danger); }
    .button-danger:hover { background: rgba(248, 81, 73, 0.1); }

    .button-small { padding: 4px 10px; font-size: 0.78rem; }

    /* Forms */
    .form-group { margin-bottom: 14px; }

    .form-label {
      display: block;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .form-input {
      width: 100%;
      padding: 8px 12px;
      background: var(--background);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .form-input:focus { border-color: var(--accent); }

    /* Alert */
    .alert {
      padding: 10px 16px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 0.85rem;
    }

    .alert-error {
      background: rgba(248, 81, 73, 0.12);
      border: 1px solid rgba(248, 81, 73, 0.3);
      color: var(--danger);
    }

    .alert-info {
      background: rgba(88, 166, 255, 0.1);
      border: 1px solid rgba(88, 166, 255, 0.2);
      color: var(--accent);
    }

    /* Login */
    .login-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 60vh;
    }

    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 32px;
      width: 100%;
      max-width: 380px;
    }

    .login-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 20px;
      text-align: center;
    }

    /* Modal overlay */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 200;
    }

    .modal-content {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 28px;
      width: 100%;
      max-width: 420px;
    }

    .modal-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 18px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 18px;
    }

    /* Page header */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .page-title {
      font-size: 1.3rem;
      font-weight: 700;
    }

    /* Toggle */
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
      cursor: pointer;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 11px;
      transition: background 0.2s;
    }

    .toggle-track::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      background: var(--text);
      border-radius: 50%;
      top: 3px;
      left: 3px;
      transition: transform 0.2s;
    }

    .toggle input:checked + .toggle-track { background: var(--accent); }
    .toggle input:checked + .toggle-track::after { transform: translateX(18px); }

    /* Utility */
    .flex-gap { display: flex; gap: 8px; }
    .text-muted { color: var(--text-muted); }
    .mb-4 { margin-bottom: 16px; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo">AeorDB</div>
    <nav class="sidebar-nav">
      <a class="nav-link active" data-page="dashboard" href="#dashboard">Dashboard</a>
      <a class="nav-link" data-page="users" href="#users">Users</a>
    </nav>
  </aside>
  <main class="main" id="main-content"></main>

  <script src="https://unpkg.com/react-charty@0.1.7/dist/charty.min.js"></script>
  <script type="module" src="/portal/app.mjs"></script>
</body>
</html>
